name: ai-morning-brief
topic: AI 早报
schedule: "0 7 * * *"

output:
  format: morning-brief
  persist: true

# Top-level sources — all aggregated before LLM interpretation
sources:
  - id: aihot-daily
    type: aihot
    enabled: true
    config:
      endpoint: daily
    metadata:
      authority: high

dimensions:
  - name: 公司决策
    search:
      keywords:
        - "OpenAI 最新 新闻"
        - "Anthropic Claude 最新动态"
      engine: auto
      concurrent: true
    filter:
      max_results: 5
      max_age_days: 3

verification:
  enabled: true
  pass_threshold: 0.6
