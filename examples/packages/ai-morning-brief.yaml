name: "AI Morning Brief"
topic: "artificial-intelligence"
schedule: "0 7 * * *"
enabled: true

sources:
  - id: "aihot-selected"
    type: rss
    enabled: true
    config:
      url: "https://aihot.virxact.com/feed.xml"
      max_items: 20
    metadata:
      category: "aggregator"
      authority: high

  - id: "anthropic-news"
    type: rss
    enabled: true
    config:
      url: "https://www.anthropic.com/news/rss"
      max_items: 10
    metadata:
      category: "company"
      authority: high

  - id: "openai-news"
    type: web_fetch
    enabled: true
    config:
      urls:
        - "https://openai.com/news"
      max_chars: 1500
      timeout: 10
    metadata:
      category: "company"
      authority: high

  - id: "github-trending"
    type: api
    enabled: true
    config:
      endpoint: "https://api.github.com/search/repositories"
      method: GET
      headers:
        Accept: "application/vnd.github.v3+json"
      params:
        q: "created:>{date-7d} ai OR agent OR llm"
        sort: "stars"
        order: "desc"
        per_page: 10
      timeout: 10
    metadata:
      category: "open-source"
      authority: high

verification:
  enabled: true
  cross_reference_min: 2
  max_age_days: 3
  fallback_max_age_days: 7
  authority_weights:
    high: 1.0
    medium: 0.7
    low: 0.4

output:
  confidence_base: 0.7
  tags:
    - "ai"
    - "morning-brief"
