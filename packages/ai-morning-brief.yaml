name: ai-morning-brief
topic: AI 早报
schedule: "0 7 * * *"

output:
  format: morning-brief
  persist: true

# Top-level sources — aggregated with dimension searches before LLM interpretation
sources:
  - id: aihot-daily
    type: aihot
    enabled: true
    config:
      endpoint: daily
    metadata:
      authority: high

dimensions:
  - name: 研究员观点
    search:
      keywords:
        - "Karpathy 最新观点 新闻"
        - "LeCun JEPA 世界模型 最新"
        - "Ilya Sutskever SSI 最新动态"
        - "Hinton AI 最新观点"
        - "何恺明 AI 最新研究"
      engine: auto
      concurrent: true
    filter:
      max_results: 3
      max_age_days: 3

  - name: 公司决策
    search:
      keywords:
        - "OpenAI 最新 新闻 发布"
        - "Anthropic Claude 最新动态"
        - "Google DeepMind 最新发布"
        - "字节跳动 豆包 AI 最新"
        - "DeepSeek 最新发布 新闻"
        - "阿里 Qwen 最新 新闻"
        - "Meta AI 最新动态"
      engine: auto
      concurrent: true
    filter:
      max_results: 5
      max_age_days: 3

  - name: 资本决策
    search:
      keywords:
        - "AI 融资 最新 新闻 2026"
        - "具身智能 机器人 投资 最新"
        - "OpenAI Anthropic 融资 估值"
      engine: auto
      concurrent: true
    filter:
      max_results: 3
      max_age_days: 5

  - name: 国家政策
    search:
      keywords:
        - "AI 政策 最新 工信部 发改委"
        - "EU AI Act 最新进展 2026"
        - "AI 监管 政策 法规 新闻"
      engine: auto
      concurrent: true
    filter:
      max_results: 2
      max_age_days: 7

  - name: 开源趋势
    search:
      keywords:
        - "GitHub AI 新项目 stars 热门 本周"
        - "LLM 开源模型 新发布 2026"
        - "AI 开源框架 更新"
      engine: auto
      concurrent: true
    filter:
      max_results: 5
      max_age_days: 3

  - name: 应用落地
    search:
      keywords:
        - "AI Agent 产品 应用 发布 新闻 2026"
        - "机器人 产品 发布 最新 新闻"
        - "AI 编程工具 更新 2026年5月"
      engine: auto
      concurrent: true
    filter:
      max_results: 3
      max_age_days: 3

verification:
  enabled: true
  pass_threshold: 0.6
