# Linglong 配置文件示例
# 复制为 .linglong.yaml 后按需修改
# 未列出的字段使用默认值

# 通用
debug: false
log_level: "INFO"

# 路径
data_dir: ~/linglong/data

# 知识库
knowledge:
  wiki_path: ~/linglong/wiki
  db_path: ~/linglong/db/knowledge.db
  vector_enabled: true
  vector_dimensions: 768
  embedding_url: "http://localhost:7997"
  embedding_model: "nomic-embed-text-v1.5"
  generate_embeddings: true

  # 写入设置
  write_mode: confirm        # confirm（需确认）/ auto（自动确认）
  auto_index: true
  max_versions: 10
  auto_lint: false

  # 并发设置
  lock_timeout: 5
  db_mode: wal

  # 定时巡检（cron 表达式）
  # lint_schedule: "0 2 * * *"

  # 审核引擎
  review_high_confidence_threshold: 0.9
  review_low_confidence_threshold: 0.6

  # 同步源路径（按需配置）
  # openclaw_wiki_path: ~/.openclaw/workspace/memory/wiki
  # claude_memory_path: ~/.claude/projects/xxx/memory
  # codex_path: ~/.codex

# 信息采集
ingest:
  fetch_interval_minutes: 30
  max_items_per_source: 50
  # package_paths:
  #   - ~/linglong/data/packages
  verification_enabled: true
  verification_pass_threshold: 0.6

# 内容生产
composer:
  # LLM 设置
  # llm_provider: openai
  # llm_model: gpt-4
  # llm_api_key: ""          # 建议用环境变量 LL_COMPOSER_LLM_API_KEY
  # llm_base_url: ""

  distiller_use_llm: false
  template_name: blog
  drafts_dir: ~/linglong/data/drafts

  # 自动发布
  auto_publish: false
  default_publisher: local

  # 图片资产
  # image_assets:
  #   enabled: true
  #   sources:
  #     - name: tuchong
  #       url_file: ~/Downloads/resource.txt
  #       resolve_via: playwright

# 多平台分发
dispatch:
  enabled: true
  default_publisher: hexo
  publishers:
    - name: hexo
      type: hexo
      enabled: true
      config:
        hexo_path: ~/blog
        use_git_workflow: true
        site_url: "https://www.linglong.wiki"
    - name: local
      type: local
      enabled: false
      config:
        output_dir: ~/Downloads

  # OSS 图片 CDN
  # oss:
  #   enabled: true
  #   bucket_name: linglong-blog
  #   endpoint: oss-cn-zhangjiakou.aliyuncs.com
  #   cdn_domain: linglong-blog.oss-cn-zhangjiakou.aliyuncs.com
  #   prefix: images/
  #   # access_key_id: ""     # 建议用环境变量 LL_OSS_ACCESS_KEY_ID
  #   # access_key_secret: "" # 建议用环境变量 LL_OSS_ACCESS_KEY_SECRET
