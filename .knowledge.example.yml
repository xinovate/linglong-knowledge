# Knowledge base configuration
# Copy to .knowledge.yml and customize
# Unlisted fields use defaults from config.py

# General
debug: false
log_level: "INFO"

# Knowledge store
knowledge:
  wiki_path: ~/linglong/wiki
  db_path: ~/linglong/db/knowledge.db
  generate_embeddings: true
  embedding_url: "http://localhost:7997"
  embedding_model: "nomic-ai/nomic-embed-text-v1.5"
  # embedding_api_key: ${EMBEDDING_API_KEY}

  # Write settings
  write_mode: confirm        # confirm | auto
  auto_lint: false
  max_versions: 10
  db_mode: wal

  # Scheduled lint (cron expression)
  # lint_schedule: "0 2 * * *"

  # Sync source paths (configure as needed)
  # openclaw_wiki_path: ~/.openclaw/workspace/memory/wiki
  # claude_memory_path: ~/.claude/projects/xxx/memory
  # codex_path: ~/.codex

# MCP server
mcp:
  transport: stdio           # stdio | streamable-http
  host: "127.0.0.1"
  port: 9900
  # auth_token: ""           # static token, or use KB_MCP_AUTH_TOKEN
  # redis_url: ""            # dynamic token via Redis, or use KB_MCP_REDIS_URL
